<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner - Southevents</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0e0e0e;
      color: #f5f2ec;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #1a1a1a;
      border-radius: 20px;
      padding: 30px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h1 { font-size: 22px; margin-bottom: 6px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
    #reader { width: 100%; border-radius: 12px; overflow: hidden; }
    #result {
      margin-top: 20px;
      padding: 16px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      display: none;
    }
    .valid { background: #052e16; color: #4ade80; }
    .invalid { background: #2d0000; color: #ef4444; }
    .ticket-id { font-size: 14px; font-weight: normal; margin-top: 6px; color: #aaa; }
    button {
      margin-top: 20px;
      background: #f5f2ec;
      color: #000;
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔍 Scanner Billet</h1>
    <p class="subtitle">Pointez la caméra vers le QR code du billet</p>
    <div id="reader"></div>
    <div id="result"></div>
    <button id="resetBtn" onclick="resetScanner()">Scanner un autre billet</button>
  </div>

  <script>
    let html5QrCode = null
    let scanned = false

    function startScanner() {
      html5QrCode = new Html5Qrcode("reader")
      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess,
        onScanError
      ).catch(err => {
        document.getElementById('result').style.display = 'block'
        document.getElementById('result').className = 'invalid'
        document.getElementById('result').innerHTML = `❌ Caméra inaccessible<div class="ticket-id">${err}</div>`
      })
    }

    function onScanSuccess(ticketId) {
      if (scanned) return
      scanned = true

      html5QrCode.stop()

      const resultEl = document.getElementById('result')
      const resetBtn = document.getElementById('resetBtn')

      // Vérifie que c'est un billet Southevents valide
      if (ticketId.startsWith('SOUTH-')) {
        resultEl.className = 'valid'
        resultEl.innerHTML = `✅ BILLET VALIDE<div class="ticket-id">${ticketId}</div>`
      } else {
        resultEl.className = 'invalid'
        resultEl.innerHTML = `❌ BILLET INVALIDE<div class="ticket-id">${ticketId}</div>`
      }

      resultEl.style.display = 'block'
      resetBtn.style.display = 'inline-block'
    }

    function onScanError(err) {
      // Ignore les erreurs silencieuses (scan en cours)
    }

    function resetScanner() {
      scanned = false
      document.getElementById('result').style.display = 'none'
      document.getElementById('resetBtn').style.display = 'none'
      startScanner()
    }

    // Démarrage automatique
    startScanner()
  </script>
</body>
</html>
