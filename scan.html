<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner Billet - Southevents</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #000 0%, #111 100%);
      color: #f5f2ec; 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      padding: 20px;
    }
    .scanner-container { 
      background: rgba(20,20,20,0.9); 
      border-radius: 20px; 
      padding: 30px; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    video { 
      width: 100%; 
      max-width: 300px; 
      height: 300px; 
      border-radius: 15px; 
      border: 3px solid #f5f2ec;
      object-fit: cover;
    }
    #result { 
      margin-top: 20px; 
      font-size: 24px; 
      font-weight: bold;
      min-height: 30px;
    }
    .valid { color: #4ade80; }
    .invalid { color: #ef4444; }
    .loading { color: #f5f2ec; }
    h1 { 
      font-size: 28px; 
      margin-bottom: 10px; 
      font-weight: 700;
    }
    .subtitle { 
      color: #9ca3af; 
      margin-bottom: 30px; 
      font-size: 16px;
    }
    button { 
      background: #f5f2ec; 
      color: #000; 
      border: none; 
      padding: 12px 24px; 
      border-radius: 25px; 
      font-size: 16px; 
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="scanner-container">
    <h1>🔍 Scanner Billet</h1>
    <p class="subtitle">Pointez la caméra vers le QR code</p>
    <video id="video" autoplay playsinline></video>
    <div id="result" class="loading">En attente...</div>
    <button onclick="location.reload()">Nouvelle scan</button>
  </div>

  <script src="https://unpkg.com/@zxing/library@0.20.1/umd/index.min.js"></script>
  <script>
    const codeReader = new ZXing.BrowserMultiFormatReader()
    
    codeReader.decodeFromVideoDevice(
      null, 
      'video', 
      (result, err) => {
        if (result) {
          const ticketId = result.text.trim()
          document.getElementById('result').innerHTML = `Billet: <strong>${ticketId}</strong>`
          document.getElementById('result').className = 'valid'
          
          // Vérifier billet (optionnel)
          fetch(`/check-ticket?ticket=${ticketId}`)
            .then(r => r.json())
            .then(data => {
              if (data.valid) {
                document.getElementById('result').innerHTML += '<br>✅ <strong>VALIDÉ</strong>'
              } else {
                document.getElementById('result').className = 'invalid'
                document.getElementById('result').innerHTML += '<br>❌ <strong>INVALIDÉ</strong>'
              }
            })
        }
        if (err && !(err.name == 'NotFoundError')) {
          console.error('Erreur scan:', err)
        }
      }
    )
  </script>
</body>
</html>
